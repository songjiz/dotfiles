# ---------- Options ----------
# Remap prefix from 'Ctrl-b' to 'Ctrl-Space'
unbind C-b
set-option -g prefix 'C-Space'
bind-key 'C-Space' send-prefix

set-window-option -g mode-keys vi

# Make tmux display things in 256 colors
set-option -g default-terminal "xterm-256color"
set-option -ga terminal-overrides ",*256col*:Tc"
set-option -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'

# Set scrollback history
set-option -g history-limit 50000

# Shorten command delay
set-option -sg escape-time 10

# Start windows numbering at 1 (0 by default)
set-option -g base-index 1

# Make pane numbering consistent with windows
set-window-option -g pane-base-index 1

# Rename window to reflect current program
set-window-option -g automatic-rename on

# Renumber windows when a window is closed
set-window-option -g renumber-windows on

# Mouse behavior
set-option -g mouse off

# Set terminal title
set-option -g set-titles on
set-option -g set-titles-string '#h ❐ #S ● #I #W'

# Set window notifications
set-option -g visual-activity off
set-window-option -g monitor-activity off

# Status Bar
set-option -g status on # Turn the status bar on
set-option -g status-left-length 100
set-option -g status-right-length 100
set-window-option -g clock-mode-style 24 # 24 hour clock
set-option -g status-interval 15 # update frequencey (default 15 seconds)

# ---------- Keys ----------
# Session manager
bind-key ^f command-prompt -p find-session 'switch-client -t %%'

bind-key c new-window -c "#{pane_current_path}"

# Window split
bind-key s split-window -v -c "#{pane_current_path}" -p 30
bind-key - split-window -v -c "#{pane_current_path}"
bind-key v split-window -h -c "#{pane_current_path}" -p 30
bind-key | split-window -h -c "#{pane_current_path}"

# Make the current window the first window
bind-key T swap-window -t 1

# Windows navigation
bind-key ^h previous-window # select previous window
bind-key ^p previous-window # select previous window
bind-key ^l next-window     # select next window
bind-key ^n next-window     # select next window
bind-key n next-window      # select next window
bind-key N previous-window  # select previous window
bind-key Space last-window  # move to last active window
bind-key ^o swap-window -t:+ \; swap-pane -s:-
bind-key ^O swap-window -t:- \; swap-pane -s:+

# Pane navigation
bind-key h select-pane -L  # Move left
bind-key l select-pane -R  # Move right
bind-key j select-pane -D  # Move down
bind-key k select-pane -U  # Move up
bind-key > swap-pane -D    # Swap current pane with the next one
bind-key < swap-pane -U    # Swap current pane with the previous one

# Auto hide pane-border-status line when only one pane is displayed
set-hook -g after-new-window   'run-shell -b "if [ #{window_panes} -eq 1 ]; then tmux set pane-border-status off; fi"'
set-hook -g after-kill-pane    'run-shell -b "if [ #{window_panes} -eq 1 ]; then tmux set pane-border-status off; fi"'
set-hook -g pane-exited        'run-shell -b "if [ #{window_panes} -eq 1 ]; then tmux set pane-border-status off; fi"'
set-hook -g after-split-window 'run-shell -b "if [ #{window_panes} -gt 1 ]; then tmux set pane-border-status top; fi"'
set-hook -g after-resize-pane  'run-shell -b "if [ #{||:#{==:#{window_panes},1},#{window_zoomed_flag}} ]; then tmux set pane-border-status off; else tmux set pane-border-status top; fi"'
set-hook -g after-select-pane  'run-shell -b "if [ #{window_panes} -eq 1 ]; then tmux set pane-border-status off; else tmux set pane-border-status top; fi"'

# Pane resize
bind-key H resize-pane -L 10 # To the leftward
bind-key L resize-pane -R 10 # To the rightward
bind-key J resize-pane -D 10 # To the dowward
bind-key K resize-pane -U 10 # To the upward

# Copy mode
bind-key Enter copy-mode # Enter copy mode
bind-key b list-buffers  # List paster buffers
bind-key p paste-buffer  # Paste from the top pate buffer
bind-key P choose-buffer # Choose which buffer to paste from
bind-key -T copy-mode-vi v send-key -X begin-selection
bind-key -T copy-mode-vi ^v send-key -X rectangle-toggle
bind-key -T copy-mode-vi y send-key -X copy-selection
bind-key -T copy-mode-vi H send-key -X start-of-line
bind-key -T copy-mode-vi L send-key -X end-of-line
bind-key -T copy-mode-vi Escape send-key -X cancel

# Edit mode
bind-key -cT edit-mode-vi H send-key -X start-of-line
bind-key -cT edit-mode-vi L send-key -X end-of-line
bind-key -cT edit-mode-vi Escape send-key -X cancel

# Easy config reload
bind-key r source-file ~/.tmux.conf \; display 'Configuration Reloaded!'

# ---------- Theme ---------
# Set colors for command line(messages)
set-option -g message-fg "colour250"
set-option -g message-bg "colour236"
set-option -g message-attr bright

# Set colors for inactive panes
set-option -g pane-border-status off
set-option -g pane-border-format ""
set-option -g pane-border-fg "colour238"
set-option -g pane-border-bg "colour234"

# Set colors for active panes
set-option -g pane-active-border-fg "colour238"
set-option -g pane-active-border-bg "colour234"

# Status Bar
wg_session="#[fg=colour4,bg=colour236,bold] ❐ #S "
wg_zoom="#[fg=colour14,bg=colour236]#{?window_zoomed_flag,[Z],[N]}"
wg_time="#[fg=colour14,bg=colour236]%Y-%m-%d %H:%M"
wg_ip="#[fg=colour4,bg=colour236]#(curl icanhazip.com)"
set-option -g status-bg "colour236"
set-option -g status-fg "colour250"
set-option -g status-justify "left"
set-option -g status-attr "none"
set-option -g status-right-attr "none"
set-option -g status-left-attr "none"
set-option -g status-left "$wg_session"
set-option -g status-right "$wg_zoom | $wg_time | $wg_ip "

# Set colors for inactive windows
set-window-option -g window-status-fg "colour250"
set-window-option -g window-status-bg "colour236"
set-window-option -g window-status-attr "none"
set-window-option -g window-status-separator ""

# Set colors for active windows
set-window-option -g window-status-activity-bg "colour236"
set-window-option -g window-status-activity-fg "colour250"
set-window-option -g window-status-current-fg "colour10"
set-window-option -g window-status-current-bg "colour236"
set-window-option -g window-status-format " #I: #W "
set-window-option -g window-status-current-format " #I: #W "

# ---------- Plugins ----------
# Tmux plugins
# Press prefix + I (capital I to fetch the plugins
# Press prefix + U(captital U) to update plugins
# Press prefix + alt + u to uninstall plugins not in the plugin list
set-option -g @plugin 'tmux-plugins/tpm'

# ====== Add plugins here ======

# prefix + Ctrl-s - save session
# prefix + Ctrl-r - restore session
# set-option -g @plugin 'tmux-plugins/tmux-resurrect'

# Last saved environment is automatically restored when tmux is started
# set-option -g @plugin 'tmux-plugins/tmux-continuum'
# set-option -g @continuum-restore 'on'

# prefix + g - prompts for session name and switches to it
# prefix + C (shift + c) - prompt for creating a new session by name
# prefix + X (shift + x) - kill current session without detaching tmux
# prefix + S (shift + s) - switches to the last session
# prefix + @ - promote current pane into a new session
# prefix + t<secondary-key> - join currently marked pane (prefix + m) to current session/window, and switch to it
# Secondary keys:
# 1) h, -, ": join horizontally
# 2) v, |, %: join vertically
# 3) f, @: join full screen
# set-option -g @plugin 'tmux-plugins/tmux-sessionist'

# Copy to the system clipboard in tmux
set-option -g @plugin 'tmux-plugins/tmux-yank'

# prefix + u - listing all urls on bottom pan
set-option -g @plugin 'tmux-plugins/tmux-urlview'

# prefix + / - regex search (strings work too)
# set-option -g @plugin 'tmux-plugins/tmux-copycat'

# Initialize the tpm
run '~/.tmux/plugins/tpm/tpm'

# copy to macos-clipboard
if -b 'command -v reattach-to-user-namespace > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | reattach-to-user-namespace pbcopy"'

# copy to X11-clipboard
if -b 'command -v xsel > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | xsel -i -b"'
if -b '! command -v xsel > /dev/null 2>&1 && command -v xclip > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | xclip -i -selection clipboard >/dev/null 2>&1"'

# ---------- Local config ----------
if-shell "[ -f ~/.tmux.conf.local ]" "source-file ~/.tmux.conf.local"
